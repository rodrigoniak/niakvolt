<!DOCTYPE html>
<html>
<head>
    <title>Niak Volt</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="static/favicon.ico">
</head>
<body>

<div class="container">
	<div class="dashboard">
		<header class="top-bar">
			<h1>🔌 Niak Volt</h1>
			<div class="connection-wrapper">
				<button id="btn-status" class="status" onclick="toggleMenu()"></button>
				<div id="menu" class="port-menu hidden"></div>
			</div>
		</header>
	</div>
	
</div>

<div id="overlay" class="overlay hidden"></div>

<div id="popup" class="popup hidden">
  <span id="popupMessage"></span>
  <button onclick="closePopup()">OK</button>
</div>

<script>

let source
const btnStatus = document.getElementById("btn-status")
const menu = document.getElementById("menu")

function updateStatus(){
    fetch("/api/status")
    .then(r => r.json())
    .then(d => {
		source = d
		clearStatus()
		if(d.status === "DISCONNECTED"){
			btnStatus.innerHTML = "CONNECT"
		}else if(d.status === "ON"){
			btnStatus.innerHTML = d.status + " (" + d.port + ")"
			btnStatus.classList.add("status-on")
		}else if(d.status === "OFF"){
			btnStatus.innerHTML = d.status + " (" + d.port + ")"
			btnStatus.classList.add("status-off")
		}
    })
}

function clearStatus(){
	btnStatus.classList.remove("status-on")
	btnStatus.classList.remove("status-off")
}

function toggleMenu(){
	menu.innerHTML = ""
    if(menu.classList.contains("hidden")){
		if(source.status === "DISCONNECTED") {
			loadPorts()
		}else if(source.status === "ON") {
			let btnOff = document.createElement("button")
            btnOff.innerText = "Turn off"
			btnOff.onclick = () => powerOff()
            menu.appendChild(btnOff)
		    let btnDisconnect = document.createElement("button")
            btnDisconnect.innerText = "Disconnect"
			btnDisconnect.onclick = () => disconnect()
            menu.appendChild(btnDisconnect)
		}else if(source.status === "OFF") {
			let btnOff = document.createElement("button")
            btnOff.innerText = "Turn off"
			btnOff.onclick = () => powerOff()
            menu.appendChild(btnOff)
		    let btnDisconnect = document.createElement("button")
            btnDisconnect.innerText = "Disconnect"
			btnDisconnect.onclick = () => disconnect()
            menu.appendChild(btnDisconnect)
		}
    }
	menu.classList.toggle("hidden")
}

function loadPorts(){
    fetch("/api/ports")
    .then(r => r.json())
    .then(ports => {
        if(ports.length === 0){
		    let btn = document.createElement("button")
            btn.innerText = "No ports COM"
            menu.appendChild(btn)
            return
        }

        ports.forEach(port => {
            let btn = document.createElement("button")
            btn.innerText = port
            btn.onclick = () => connect(port)
            menu.appendChild(btn)
        })
    })
}

function connect(port){
	clearStatus()
	btnStatus.innerHTML = '<div class="loader"></div>'
	toggleMenu()
    fetch("/api/connect", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({port: port})
    })
    .then(r => r.json())
    .then(d => {
        if(d.error){
			showPopup("Erro: " + d.error)
        }
		updateStatus()
    })
}

function disconnect(){
	clearStatus()
	btnStatus.innerHTML = '<div class="loader"></div>'
	toggleMenu()
    fetch("/api/disconnect")
    .then(r => r.json())
    .then(d => {
        if(d.error){
			showPopup("Erro: " + d.error)
        }
		updateStatus()
    })
}

function powerOff(){
	clearStatus()
	btnStatus.innerHTML = '<div class="loader"></div>'
	toggleMenu()
    fetch("/api/poweroff")
    .then(r => r.json())
    .then(d => {
        if(d.error){
			showPopup("Erro: " + d.error)
        }
		updateStatus()
    })
}

function showPopup(msg) {
    document.getElementById("popup").classList.remove("hidden")
    document.getElementById("popupMessage").textContent = msg
	document.getElementById("overlay").classList.remove("hidden")
}

function closePopup() {
    document.getElementById("popup").classList.add("hidden")
	document.getElementById("overlay").classList.add("hidden")
}

updateStatus()

</script>

</body>
</html>
